name: KeyPilot
options:
  bundleIdPrefix: com.keypilot
  deploymentTarget:
    macOS: "12.0"
  xcodeVersion: "14.0"
settings:
  base:
    SWIFT_VERSION: "5.7"
    MACOSX_DEPLOYMENT_TARGET: "12.0"
    ARCHS: "x86_64 arm64"
    ONLY_ACTIVE_ARCH: NO
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES
    CLANG_ENABLE_MODULES: YES
targets:
  KeyPilot:
    type: application
    platform: macOS
    sources:
      - path: KeyPilot
        excludes:
          - Info.plist
          - KeyPilot.entitlements
    resources:
      - path: KeyPilot/Resources
    info:
      path: KeyPilot/Info.plist
      properties:
        CFBundleDisplayName: KeyPilot
        CFBundleShortVersionString: 1.2.1
        CFBundleVersion: 7
        LSUIElement: true
    entitlements:
      path: KeyPilot/KeyPilot.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.keypilot.mac
        PRODUCT_NAME: KeyPilot
        INFOPLIST_FILE: KeyPilot/Info.plist
        CODE_SIGN_ENTITLEMENTS: KeyPilot/KeyPilot.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    dependencies:
      - target: KeyPilotLoginHelper
    preBuildScripts:
      - name: Embed Login Helper
        script: |
          helper_destination="$TARGET_BUILD_DIR/$CONTENTS_FOLDER_PATH/Library/LoginItems"
          mkdir -p "$helper_destination"
          ditto "$BUILT_PRODUCTS_DIR/KeyPilotLoginHelper.app" "$helper_destination/KeyPilotLoginHelper.app"
  KeyPilotLoginHelper:
    type: application
    platform: macOS
    sources:
      - path: KeyPilotLoginHelper
    info:
      path: KeyPilotLoginHelper/Info.plist
      properties:
        CFBundleDisplayName: KeyPilot Login Helper
        LSUIElement: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.keypilot.mac.loginhelper
        PRODUCT_NAME: KeyPilotLoginHelper
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: KeyPilotLoginHelper/Info.plist
        SKIP_INSTALL: YES
  KeyPilotTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: KeyPilotTests
    dependencies:
      - target: KeyPilot
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.keypilot.mac.tests
        GENERATE_INFOPLIST_FILE: YES
schemes:
  KeyPilot:
    build:
      targets:
        KeyPilot: all
        KeyPilotLoginHelper: all
        KeyPilotTests: [test]
    test:
      targets:
        - KeyPilotTests
    run:
      config: Debug
    archive:
      config: Release
